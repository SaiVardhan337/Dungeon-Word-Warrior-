<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standalone Web Audio Synthesizer Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0b14;
      color: #00ffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #161224;
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
      text-align: center;
      max-width: 450px;
    }
    button {
      background: #00ffff;
      color: #0d0b14;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #00ffff;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🎵 Web Audio Synth Demo</h2>
    <p>Zero external audio files! Sound effects synthesized in real time via JavaScript Web Audio API.</p>
    <div style="margin-top: 20px;">
      <button onclick="sound.click(0)">Melodic Key (Note C4)</button>
      <button onclick="sound.click(4)">Melodic Key (Note A4)</button>
      <button onclick="sound.freeze()">Freeze Spell</button>
      <button onclick="sound.fireball()">Fireball Explosion</button>
      <button onclick="sound.shield()">Shield Barrier</button>
      <button onclick="sound.win()">Victory Fanfare</button>
    </div>
  </div>

  <script>
    class SimpleSynth {
      constructor() {
        this.ctx = null;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
      playTone(freqs, durs, type = "square", vol = 0.2) {
        this.init();
        let time = this.ctx.currentTime;
        let gain = this.ctx.createGain();
        gain.connect(this.ctx.destination);
        freqs.forEach((freq, idx) => {
          let dur = durs[idx];
          let osc = this.ctx.createOscillator();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(vol, time + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, time + dur - 0.01);
          osc.connect(gain);
          osc.start(time);
          osc.stop(time + dur);
          time += dur;
        });
      }
      playNoise(dur, vol = 0.2) {
        this.init();
        let bufferSize = this.ctx.sampleRate * dur;
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
      }
      click(idx = 0) {
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
        this.playTone([scale[idx % scale.length]], [0.06], "square", 0.1);
      }
      freeze() { this.playTone([800, 600, 400], [0.1, 0.1, 0.15], "sine", 0.3); }
      fireball() { this.playNoise(0.35, 0.4); }
      shield() { this.playTone([500, 750, 1000], [0.04, 0.04, 0.15], "sine", 0.25); }
      win() { this.playTone([523, 659, 784, 1047], [0.12, 0.12, 0.12, 0.3], "square", 0.2); }
    }
    const sound = new SimpleSynth();
  </script>

</body>
</html>
